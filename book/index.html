<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book a Consultation | QQ Solutions</title>
    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="refresh" content="0; url=https://calendly.com/qqwebsitesolutions/qq-solutions-consultation">
    <link rel="canonical" href="https://www.qqwebsitesolutions.com/book/">
    <style>
      :root {
        --bg: #0f172a;
        --card: rgba(255, 255, 255, 0.08);
        --text: #f8fafc;
        --muted: rgba(248, 250, 252, 0.72);
        --accent: #d42723;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(212, 39, 35, 0.22), transparent 42%),
          linear-gradient(180deg, #111827 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: var(--card);
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 14px;
        font-size: 34px;
        line-height: 1.1;
      }

      a {
        color: white;
      }

      .button {
        display: inline-block;
        margin-top: 10px;
        padding: 14px 20px;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace('https://calendly.com/qqwebsitesolutions/qq-solutions-consultation');
    </script>
  </head>
  <body>
    <main>
      <p class="eyebrow">QQ Solutions</p>
      <h1>Redirecting to booking</h1>
      <p>You are being redirected to our consultation calendar.</p>
      <p>If the page does not open automatically, use the button below.</p>
      <a class="button" href="https://calendly.com/qqwebsitesolutions/qq-solutions-consultation">Open Booking Page</a>
    </main>
  </body>
</html>
